services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./QLiDienThoai.sql:/init.sql
    command: >
      bash -c "
      /opt/mssql/bin/sqlservr &
      echo '⏳ Waiting for SQL Server...';
      until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -No -Q 'SELECT 1' > /dev/null 2>&1; do
        sleep 2;
      done;
      echo '✅ SQL Server is ready';
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -No -Q \"IF DB_ID('QLiDienThoai') IS NULL CREATE DATABASE QLiDienThoai\";
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -No -d QLiDienThoai -i /init.sql;
      wait
      "

  backend:
    build: .
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Ho_Chi_Minh"
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=QLiDienThoai;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Password123!
    depends_on:
      - sqlserver
    restart: on-failure
    command: >
      sh -c "sleep 40 && java -Duser.timezone=Asia/Ho_Chi_Minh -jar /app/app.jar"

volumes:
  sqldata: